<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amerouze — Profile</title>
    <style>
        :root {
            --bg-color: #050505;
            --glass: rgba(255, 255, 255, 0.07); 
            --border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* --- ЭКРАН ВХОДА --- */
        #enter-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .click-icon {
            width: 50px;
            height: 50px;
            fill: #fff;
            margin-bottom: 20px;
            animation: tapPulse 1.5s infinite ease-in-out;
            pointer-events: none;
        }

        .enter-text {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            pointer-events: none;
        }

        @keyframes tapPulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            filter: blur(25px);
            transition: filter 1.2s ease;
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            /* ПУТЬ БЕЗ ПАПКИ */
            background: url('bg.gif') center/cover no-repeat;
        }

        .overlay-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }

        .layout-grid {
            width: 100%;
            max-width: 580px; 
            display: grid;
            grid-template-columns: 140px 1fr;
            grid-template-rows: auto 1fr;
            gap: 15px;
            grid-template-areas:
                "avatar header"
                "tall-pic info";
        }

        .box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .area-avatar { grid-area: avatar; aspect-ratio: 1/1; }
        .area-tall-pic { grid-area: tall-pic; min-height: 260px; }
        .fill-img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .area-header {
            grid-area: header;
            display: flex; flex-direction: column; justify-content: center; padding: 0 25px;
        }

        .nickname { font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        
        .status-custom { 
            font-size: 12px; 
            margin-top: 6px; 
            font-weight: 800; 
            color: #ff3333;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
        }

        .area-info {
            grid-area: info; padding: 25px;
            display: flex; flex-direction: column; gap: 18px;
        }

        .bio-text { font-size: 13px; color: #ddd; line-height: 1.6; }
        .divider { height: 1px; background: rgba(255,255,255,0.1); width: 100%; }

        /* ПЛЕЕР */
        .music-player {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255, 255, 255, 0.05); padding: 12px 18px;
            border-radius: 18px; cursor: pointer;
            transition: background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .music-player:hover { background: rgba(255, 255, 255, 0.1); }
        
        .play-icon-box {
            width: 24px; height: 24px;
            display: flex; justify-content: center; align-items: center;
        }
        
        .play-icon-box svg {
            width: 100%; height: 100%; fill: #fff;
            pointer-events: none; 
            display: none;
        }
        
        .playing #svg-pause { display: block; }
        .paused #svg-play { display: block; }

        .track-info { display: flex; flex-direction: column; pointer-events: none; }
        .track-name { font-size: 13px; font-weight: 700; color: #fff; }
        .track-artist { font-size: 11px; color: #999; }

        .social-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .social-btn {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; color: #fff;
            text-decoration: none; font-size: 11px; font-weight: 700;
            transition: 0.3s;
        }
        .social-btn:hover { background: rgba(255,255,255,0.15); border-color: #fff; }

        @media (max-width: 500px) {
            .layout-grid { grid-template-columns: 110px 1fr; gap: 10px; }
            .area-header { padding: 0 15px; }
            .area-info { padding: 15px; }
            .social-links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="paused">

    <div id="enter-screen">
        <svg class="click-icon" viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.04.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.21 0-.62-.35-1.18-.89-1.4z"/></svg>
        <span class="enter-text">Tap to enter</span>
    </div>

    <div id="main-wrapper">
        <div class="bg-layer"></div>
        <div class="overlay-layer"></div>

        <div class="layout-grid">
            <!-- ПУТИ БЕЗ ПАПКИ -->
            <div class="box area-avatar"><img src="avatar.jpg" class="fill-img"></div>
            
            <div class="box area-header">
                <div class="nickname">AMEROUZE</div>
                <div class="status-custom">damoni dota</div>
            </div>

            <!-- ПУТИ БЕЗ ПАПКИ -->
            <div class="box area-tall-pic"><img src="side-image.gif" class="fill-img"></div>

            <div class="box area-info">
                <div class="bio-text">
                    <p><b>Name:</b> ???</p>
                    <p><b>Alias:</b> Amerouze</p>
                    <p><b>Age:</b> 14 y.o.</p>
                    <p><b>From:</b> Russia</p>
                </div>
                <div class="divider"></div>

                <div class="music-player" id="music-btn">
                    <div class="play-icon-box">
                        <svg id="svg-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="svg-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </div>
                    <div class="track-info">
                        <span class="track-name" id="track-name">Loading...</span>
                        <span class="track-artist" id="track-artist"></span>
                    </div>
                </div>
                
                <audio id="audio-player"></audio>
                <div class="divider"></div>

                <div class="social-links">
                    <a href="https://t.me/Amerouze" class="social-btn" target="_blank">Telegram</a>
                    <a href="#" class="social-btn">Discord</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const enterScreen = document.getElementById('enter-screen');
        const mainWrapper = document.getElementById('main-wrapper');
        const musicBtn = document.getElementById('music-btn');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');

        // Если твоя программа на телефоне блокирует и музыку в папках, 
        // вытащи mp3-файлы к картинкам и сотри "music/" в коде ниже. 
        // Пока оставляю как было.
        const playlist = [
            { file: 'music/1.mp3', title: 'bimbo doll', artist: 'Artist 1' },
            { file: 'music/2.mp3', title: 'Название 2', artist: 'Artist 2' }
        ];

        let currentTrack = 0;

        function loadTrack(idx) {
            audio.src = playlist[idx].file;
            trackName.textContent = playlist[idx].title;
            trackArtist.textContent = playlist[idx].artist;
        }

        audio.onplay = () => document.body.className = 'playing';
        audio.onpause = () => document.body.className = 'paused';

        loadTrack(currentTrack);

        enterScreen.onclick = () => {
            enterScreen.style.opacity = '0';
            setTimeout(() => enterScreen.style.display = 'none', 600);
            mainWrapper.style.filter = 'blur(0px)';
            audio.play();
        };

        musicBtn.onclick = () => {
            if (audio.paused) audio.play();
            else audio.pause();
        };

        audio.onended = () => {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadTrack(currentTrack);
            audio.play();
        };
    </script>
</body>
</html>
